<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android Music UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: #e6e9ef;
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }
    #scale-container {
      width: 400px;
      height: 711.11px;
      transform: scale(2.7);
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <!-- Scale Wrapper to proportionally magnify mobile layout into HD -->
  <div id="scale-container">

    <!-- Main Full-Screen Container - No margins, no outer frame space -->
    <div class="h-full w-full bg-[#e6e9ef] flex flex-col items-center justify-between py-10 px-6 font-sans text-gray-600 select-none">
    
    <!-- Top Header Section -->
    <div class="w-full flex justify-between items-center max-w-md">
      <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
        <i data-lucide="chevron-left" class="text-gray-400" width="18" height="18"></i>
      </button>
      <div class="text-center">
        <p class="text-[10px] tracking-[0.2em] uppercase opacity-40 font-bold">NCS Release</p>
      </div>
      <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
        <i data-lucide="more-vertical" class="text-gray-400" width="18" height="18"></i>
      </button>
    </div>

    <!-- Track Info -->
    <div class="text-center mt-2 px-8">
      <p class="text-[10px] font-bold tracking-[0.2em] text-cyan-600 opacity-50 mb-1 uppercase">NoCopyrightSounds</p>
      <h1 class="text-xl font-bold text-gray-800 tracking-tight leading-tight">{{SONG_NAME}}</h1>
    </div>

    <!-- Central Interactive Dial -->
    <div class="relative flex items-center justify-center mt-8">
      <!-- Sunken Outer Ring -->
      <div class="absolute w-72 h-72 rounded-full shadow-[inset_10px_10px_20px_#bebebe,inset_-10px_-10px_20px_#ffffff]"></div>
      
      <!-- Main Knob Button -->
      <div class="relative w-56 h-56 rounded-full bg-[#e6e9ef] shadow-[15px_15px_30px_#bebebe,-15px_-15px_30px_#ffffff] flex items-center justify-center z-10">
        
        <!-- Circular Progress (Purple Glow) -->
        <svg class="absolute inset-0 w-full h-full -rotate-90">
          <circle
            id="ringProgress"
            cx="50%"
            cy="50%"
            r="108"
            fill="none"
            stroke="rgba(34, 211, 238, 0.4)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="678"
            stroke-dashoffset="678"
            class="transition-all duration-300 ease-linear"
            style="filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.6))"
          ></circle>
        </svg>

        <!-- Cyan Visualizer Bars -->
        <div class="flex items-end gap-1.5 h-16" id="visContainer"></div>
      </div>

      <!-- Floating Volume Level -->
      <div class="absolute right-[-45px] flex flex-col items-center">
        <div class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center mb-2">
          <span class="text-[10px] font-bold text-cyan-500">80%</span>
        </div>
        <i data-lucide="volume-2" width="14" height="14" class="opacity-30"></i>
      </div>
    </div>

    <!-- Timeline Section -->
    <div class="w-full max-w-sm px-4 mt-8">
      <div class="flex justify-between text-[11px] font-bold opacity-30 mb-2">
        <span id="timeNow">00:00</span>
        <span>00:59</span>
      </div>
      <div class="h-2 w-full bg-[#d1d9e6] rounded-full shadow-[inset_2px_2px_4px_#bebebe,inset_-2px_-2px_4px_#ffffff] overflow-hidden">
        <div id="progBar" class="h-full bg-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.8)] transition-all duration-300 ease-linear" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Sub-Controls (Repeat & Level) -->
    <div class="flex flex-col items-center gap-2 mt-4">
      <div class="flex items-center gap-6">
        <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
          <i data-lucide="minus" width="14" height="14" class="opacity-60"></i>
        </button>
        <div class="w-12 h-12 rounded-full bg-[#e6e9ef] shadow-[inset_3px_3px_6px_#bebebe,inset_-3px_-3px_6px_#ffffff] flex items-center justify-center">
          <span class="text-xs font-bold text-cyan-600">3</span>
        </div>
        <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
          <i data-lucide="plus" width="14" height="14" class="opacity-60"></i>
        </button>
      </div>
      <p class="text-[9px] uppercase tracking-[0.3em] font-bold opacity-30 mt-2">Repeat</p>
    </div>

    <!-- Main Playback Buttons -->
    <div class="w-full max-w-sm flex items-center justify-between px-6 mb-4 mt-4">
      <button class="w-16 h-16 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400 hover:text-cyan-400">
        <i data-lucide="skip-back" fill="currentColor" class="opacity-50" width="24" height="24"></i>
      </button>

      <button class="w-24 h-24 rounded-full bg-[#e6e9ef] shadow-[8px_8px_16px_#bebebe,-8px_-8px_16px_#ffffff] flex items-center justify-center text-cyan-500 relative group">
        <div class="absolute inset-0 rounded-full shadow-[inset_0_0_20px_rgba(34,211,238,0.3)] animate-pulse"></div>
        <i data-lucide="pause" fill="currentColor" width="36" height="36"></i>
      </button>

      <button class="w-16 h-16 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400 hover:text-cyan-400">
        <i data-lucide="skip-forward" fill="currentColor" class="opacity-50" width="24" height="24"></i>
      </button>
    </div>

  </div>

  <script>
    lucide.createIcons();

    // Visualizer Bars logic
    const vis = document.getElementById('visContainer');
    let bars = [];
    for(let i=0; i<7; i++) {
      let b = document.createElement('div');
      b.className = 'w-1.5 bg-cyan-400 rounded-full transition-all duration-150';
      b.style.boxShadow = '0 0 10px rgba(34, 211, 238, 0.6)';
      b.style.height = '40%';
      vis.appendChild(b);
      bars.push(b);
    }

    // Animation Loop
    setInterval(() => {
      bars.forEach(b => {
        let h = Math.floor(Math.random() * 60) + 20;
        b.style.height = h + '%';
      });
    }, 150);

    // Progress Logic
    const tDur = 59; 
    let startTime = performance.now();
    const ring = document.getElementById('ringProgress');
    const progBar = document.getElementById('progBar');
    const timeNow = document.getElementById('timeNow');

    function updateUI(now) {
      let elapsed = (now - startTime) / 1000;
      if(elapsed > tDur) elapsed = tDur;
      let p = elapsed / tDur;

      // Linear bar
      progBar.style.width = (p*100) + '%';
      
      // Text time
      let sec = Math.floor(elapsed).toString().padStart(2, '0');
      timeNow.innerText = `00:${sec}`;

      // SVG Ring
      const dash = 678; // Calculated dynamically roughly based on r=108 -> 2*PI*108 ~ 678.5
      ring.style.strokeDashoffset = dash - (dash * p);

      if(elapsed < tDur) requestAnimationFrame(updateUI);
    }
    requestAnimationFrame(updateUI);
  </script>
  </div>
</body>
</html>
