<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android Music UI - Bubble Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background: url("{{BG_IMAGE_URL}}") center center / cover no-repeat fixed;
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(8, 12, 20, 0.45), rgba(8, 12, 20, 0.6));
      z-index: 0;
    }
    #scale-container {
      width: 400px;
      height: 711.11px;
      transform: scale(2.7);
      transform-origin: top left;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Scale Wrapper to proportionally magnify mobile layout into HD -->
  <div id="scale-container">

    <!-- Main Full-Screen Container -->
    <div class="h-full w-full flex flex-col items-center justify-between pt-4 pb-10 px-6 font-sans text-gray-600 select-none">
      
      <!-- TOP GROUP: Header + Track Info -->
      <div class="w-full flex flex-col items-center">
        <!-- Top Header Section -->
        <div class="w-full flex justify-between items-center max-w-md">
          <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
            <i data-lucide="chevron-left" class="text-gray-400" width="18" height="18"></i>
          </button>
          <div class="text-center">
            <p class="text-[10px] tracking-[0.2em] uppercase opacity-40 font-bold text-gray-400">NCS Release</p>
          </div>
          <button class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[4px_4px_8px_#bebebe,-4px_-4px_8px_#ffffff] flex items-center justify-center">
            <i data-lucide="more-vertical" class="text-gray-400" width="18" height="18"></i>
          </button>
        </div>

        <!-- Track Info -->
        <div class="text-center mt-1 px-8">
          <p class="text-[10px] font-bold tracking-[0.2em] text-cyan-600 opacity-50 mb-1 uppercase">NoCopyrightSounds</p>
          <h1 class="text-xl font-bold text-gray-800 tracking-tight leading-tight">{{SONG_NAME}}</h1>
        </div>
      </div>

      <!-- Central Interactive Dial Area -->
      <div class="relative flex items-center justify-center h-[340px] w-[340px]">
        
        <!-- 1. Sunken Track -->
        <div class="absolute w-[296px] h-[296px] rounded-full shadow-[inset_12px_12px_24px_#bebebe,inset_-12px_-12px_24px_#ffffff]"></div>
        
        <!-- 2. SVG Cyan Progress Line -->
        <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
          <svg class="w-[340px] h-[340px] -rotate-90">
            <circle
              cx="170"
              cy="170"
              r="126"
              fill="none"
              stroke="#d1d9e6"
              stroke-width="2"
              opacity="0.2"
            />
            <circle
              id="ringProgress"
              cx="170"
              cy="170"
              r="126"
              fill="none"
              stroke="#22d3ee"
              stroke-width="5"
              stroke-linecap="round"
              stroke-dasharray="791.68"
              stroke-dashoffset="791.68"
              class="transition-all duration-100 ease-linear"
              style="filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.7))"
            />
          </svg>
        </div>

        <!-- 3. Fitted Bubble -->
        <div 
          id="bubbleContainer"
          class="absolute z-30 transition-all duration-100 ease-linear pointer-events-none"
        >
          <div class="w-[44px] h-[44px] rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-2px_-2px_6px_#ffffff] flex items-center justify-center border border-white/90 ring-1 ring-black/5">
            <span id="bubblePercent" class="text-[10px] font-black text-cyan-500 leading-none">0%</span>
          </div>
        </div>
        
        <!-- 4. Centre Circle (Knob) -->
        <div class="relative w-52 h-52 rounded-full bg-[#e6e9ef] shadow-[15px_15px_30px_#bebebe,-15px_-15px_30px_#ffffff] flex items-center justify-center z-20 border border-white/40">
          <div class="flex items-end gap-1.5 h-14" id="visContainer"></div>
        </div>
      </div>

      <!-- Timeline Section -->
      <div class="w-full max-w-sm px-4">
        <div class="flex justify-between text-[10px] font-bold opacity-30 mb-2">
          <span id="timeNow">00:00</span>
          <span>00:59</span>
        </div>
        <div class="h-1.5 w-full bg-[#d1d9e6] rounded-full shadow-[inset_2px_2px_4px_#bebebe,inset_-2px_-2px_4px_#ffffff] overflow-hidden">
          <div id="progBar" class="h-full bg-cyan-400 shadow-[0_0_12px_rgba(34,211,238,0.8)] transition-all duration-100" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Sub-Controls -->
      <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-6">
          <button class="w-9 h-9 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <i data-lucide="minus" width="12" height="12" class="opacity-60"></i>
          </button>
          <div class="w-10 h-10 rounded-full bg-[#e6e9ef] shadow-[inset_3px_3px_6px_#bebebe,inset_-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <span class="text-xs font-bold text-cyan-500">3</span>
          </div>
          <button class="w-9 h-9 rounded-full bg-[#e6e9ef] shadow-[3px_3px_6px_#bebebe,-3px_-3px_6px_#ffffff] flex items-center justify-center">
            <i data-lucide="plus" width="12" height="12" class="opacity-60"></i>
          </button>
        </div>
        <p class="text-[9px] uppercase tracking-[0.3em] font-bold opacity-30 mt-1">Repeat</p>
      </div>

      <!-- Main Controls -->
      <div class="w-full max-w-sm flex items-center justify-between px-6 mb-4">
        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400">
          <i data-lucide="skip-back" fill="currentColor" class="opacity-50" width="20" height="20"></i>
        </button>

        <button class="w-20 h-20 rounded-full bg-[#e6e9ef] shadow-[8px_8px_16px_#bebebe,-8px_-8px_16px_#ffffff] flex items-center justify-center text-cyan-500 relative">
          <div class="absolute inset-0 rounded-full shadow-[inset_0_0_15px_rgba(34,211,238,0.3)] animate-pulse"></div>
          <i data-lucide="pause" fill="currentColor" width="32" height="32"></i>
        </button>

        <button class="w-14 h-14 rounded-full bg-[#e6e9ef] shadow-[6px_6px_12px_#bebebe,-6px_-6px_12px_#ffffff] flex items-center justify-center text-gray-400">
          <i data-lucide="skip-forward" fill="currentColor" class="opacity-50" width="20" height="20"></i>
        </button>
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();

    // Visualizer Bars logic
    const vis = document.getElementById('visContainer');
    let bars = [];
    for(let i=0; i<7; i++) {
      let b = document.createElement('div');
      b.className = 'w-1.5 bg-cyan-400 rounded-full transition-all duration-150';
      b.style.boxShadow = '0 0 10px rgba(34, 211, 238, 0.6)';
      b.style.height = '40%';
      vis.appendChild(b);
      bars.push(b);
    }

    setInterval(() => {
      bars.forEach(b => {
        let h = Math.floor(Math.random() * 60) + 20;
        b.style.height = h + '%';
      });
    }, 150);

    // Progress Logic
    const tDur = {{DURATION}}; 
    let startTime = performance.now();
    const radius = 126;
    const dashArray = 2 * Math.PI * radius;
    
    const ring = document.getElementById('ringProgress');
    const progBar = document.getElementById('progBar');
    const timeNow = document.getElementById('timeNow');
    const bubbleContainer = document.getElementById('bubbleContainer');
    const bubblePercent = document.getElementById('bubblePercent');

    function updateUI(now) {
      let elapsed = (now - startTime) / 1000;
      if(elapsed > tDur) elapsed = tDur;
      let p = elapsed / tDur;
      let percent = Math.floor(p * 100);

      // Linear bar
      progBar.style.width = (p*100) + '%';
      
      // Text time
      let sec = Math.floor(elapsed).toString().padStart(2, '0');
      timeNow.innerText = `00:${sec}`;

      // SVG Ring
      ring.style.strokeDashoffset = dashArray - (dashArray * p);

      // Bubble Position
      const angle = (p * 360) - 90;
      const angleRad = (angle * Math.PI) / 180;
      const x = Math.cos(angleRad) * radius;
      const y = Math.sin(angleRad) * radius;
      
      bubbleContainer.style.transform = `translate(${x}px, ${y}px)`;
      bubblePercent.innerText = `${percent}%`;

      if(elapsed < tDur) requestAnimationFrame(updateUI);
    }
    requestAnimationFrame(updateUI);
  </script>
</body>
</html>
