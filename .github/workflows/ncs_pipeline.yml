name: NCS YouTube Bot (5 Shorts + 1 Long)

on:
  schedule:
    # Schedule runs (UTC time) to stagger the GitHub CPU loads
    # YouTube API Limit safe: 6 uploads per day total
    - cron: '0 4 * * *'  # 04:00 UTC (Short 1)
    - cron: '0 8 * * *'  # 08:00 UTC (Short 2)
    - cron: '0 12 * * *' # 12:00 UTC (Short 3)
    - cron: '0 16 * * *' # 16:00 UTC (Short 4)
    - cron: '0 20 * * *' # 20:00 UTC (Short 5)
    - cron: '30 22 * * *' # 22:30 UTC (Long Video)
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Type of video to generate (short or long)'
        required: true
        default: 'short'
        type: choice
        options:
        - short
        - long
      upload_to_youtube:
        description: 'Upload generated video to YouTube'
        required: true
        default: false
        type: boolean

jobs:
  run-bot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Checkout Repository 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg, OpenCV, Aria2)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libsm6 libxext6 aria2

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright==1.42.0
          python -m playwright install chromium ffmpeg

      - name: Load YouTube API & Session Credentials from Secrets
        env:
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          NCS_TRACK_URLS: ${{ secrets.NCS_TRACK_URLS }}
        run: |
          echo "$CLIENT_SECRET" > client_secret.json
          echo "$TOKEN_JSON" > token.json
          if [ -n "$NCS_TRACK_URLS" ]; then
            printf "%s\n" "$NCS_TRACK_URLS" > ncs_tracks.txt
            echo "✅ Loaded NCS track URLs from NCS_TRACK_URLS secret."
          else
            echo "⚠️ NCS_TRACK_URLS secret not set. Using repository ncs_tracks.txt."
          fi

      - name: Determine Trigger Type & Run Pipeline
        run: |
          # If triggered manually via workflow_dispatch, use user input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.upload_to_youtube }}" = "true" ]; then
              python main.py --type ${{ github.event.inputs.video_type }}
            else
              python main.py --type ${{ github.event.inputs.video_type }} --no-upload
            fi
          # If triggered by specific cron time for the Long Video
          elif [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            python main.py --type long
          # Default to Short for all other scheduled runs
          else
            python main.py --type short
          fi

      - name: Upload generated video for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-${{ github.run_id }}
          path: downloads/final_video.mp4
          if-no-files-found: warn

      - name: Commit history to prevent duplicates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f downloads_history.txt
          git commit -m "Auto-update download history [skip ci]" || echo "No new history to commit"
          git push
