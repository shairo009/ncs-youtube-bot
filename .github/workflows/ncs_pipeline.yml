name: NCS YouTube Bot (6 Shorts - Every 4 Hours)

on:
  schedule:
    # Schedule runs every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Type of video to generate (short or long)'
        required: true
        default: 'short'
        type: choice
        options:
        - short
        - long
      upload_to_youtube:
        description: 'Upload generated video to YouTube'
        required: true
        default: true
        type: boolean

jobs:
  run-bot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Checkout Repository 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg, OpenCV, Aria2, Tor)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libsm6 libxext6 aria2 tor

      - name: Start Tor and verify circuit
        run: |
          sudo service tor start
          echo "Waiting for Tor circuit to establish..."
          sleep 15
          # Verify Tor SOCKS5 is listening on port 9050
          if nc -z 127.0.0.1 9050 2>/dev/null; then
            echo "✅ Tor is running on port 9050"
          else
            echo "⚠️ Tor may not be ready yet — Engine 5 will auto-skip if unavailable"
          fi

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright==1.42.0
          python -m playwright install chromium ffmpeg

      - name: Load YouTube API & Session Credentials from Secrets
        env:
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          NCS_TRACK_URLS: ${{ secrets.NCS_TRACK_URLS }}
        run: |
          echo "$CLIENT_SECRET" > client_secret.json
          echo "$TOKEN_JSON" > token.json
          if [ -n "$NCS_TRACK_URLS" ]; then
            printf "%s\n" "$NCS_TRACK_URLS" > ncs_tracks.txt
            echo "✅ Loaded NCS track URLs from NCS_TRACK_URLS secret."
          else
            echo "⚠️ NCS_TRACK_URLS secret not set."
          fi

      - name: Determine Trigger Type & Run Pipeline
        run: |
          # If triggered manually via workflow_dispatch, use user input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.upload_to_youtube }}" = "true" ]; then
              python main.py --type ${{ github.event.inputs.video_type }}
            else
              python main.py --type ${{ github.event.inputs.video_type }} --no-upload
            fi
          # For all scheduled runs, we now do 6 Shorts (every 4 hours)
          else
            python main.py --type short
          fi

      - name: Upload generated video for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-${{ github.run_id }}
          path: downloads/final_video.mp4
          if-no-files-found: warn

      - name: Commit history to prevent duplicates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f downloads_history.txt
          git commit -m "Auto-update download history [skip ci]" || echo "No new history to commit"
          git push || echo "Skipped: no changes to push"
