name: NCS YouTube Bot (5 Shorts + 1 Long)

on:
  schedule:
    # Schedule runs (UTC time) to stagger the GitHub CPU loads
    # YouTube API Limit safe: 6 uploads per day total
    - cron: '0 4 * * *'  # 04:00 UTC (Short 1)
    - cron: '0 8 * * *'  # 08:00 UTC (Short 2)
    - cron: '0 12 * * *' # 12:00 UTC (Short 3)
    - cron: '0 16 * * *' # 16:00 UTC (Short 4)
    - cron: '0 20 * * *' # 20:00 UTC (Short 5)
    - cron: '30 22 * * *' # 22:30 UTC (Long Video)
  
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Type of video to generate (short or long)'
        required: true
        default: 'short'
        type: choice
        options:
        - short
        - long

jobs:
  run-bot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Checkout Repository 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg & OpenCV reqs)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libsm6 libxext6

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade yt-dlp
          pip install -r requirements.txt

      - name: Load YouTube API Credentials from Secrets
        env:
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRET" > client_secret.json
          echo "$TOKEN_JSON" > token.json

      - name: Determine Trigger Type & Run Pipeline
        run: |
          # If triggered manually via workflow_dispatch, use user input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py --type ${{ github.event.inputs.video_type }}
          # If triggered by specific cron time for the Long Video
          elif [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            python main.py --type long
          # Default to Short for all other scheduled runs
          else
            python main.py --type short
          fi

      - name: Commit history to prevent duplicates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f downloads_history.txt
          git commit -m "Auto-update download history [skip ci]" || echo "No new history to commit"
          git push
